<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Precious Invitation 専用予約リクエストフォーム</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary-color: #2c5e7a; --accent-color: #5d9bb8; --bg-color: #f4f9fb; }
    body { font-family: 'Noto Serif JP', serif; background-color: var(--bg-color); color: #231f20; margin: 0; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header-container { text-align: center; margin-bottom: 30px; width: 100%; max-width: 480px; }
    .header-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: var(--primary-color); margin: 0 0 10px 0; letter-spacing: 3px; text-transform: uppercase; }
    .header-subtitle { font-size: 13px; font-weight: 600; color: var(--accent-color); margin: 0; letter-spacing: 2px; }
    .card { background: #ffffff; max-width: 480px; width: 100%; padding: 40px 25px; box-shadow: 0 20px 50px rgba(44, 94, 122, 0.08); box-sizing: border-box; position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary-color), var(--accent-color)); }
    .lead-text { font-size: 14px; line-height: 2; color: #555; text-align: center; margin-bottom: 30px; font-weight: 600; }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-size: 13px; font-weight: 900; color: var(--primary-color); margin-bottom: 8px; }
    .form-group label span { color: #c87a53; margin-left: 5px; font-size: 11px; }
    input[type="text"], input[type="date"], input[type="time"], textarea { 
      width: 100%; padding: 14px; border: 1px solid #d0e1e9; font-size: 15px; font-weight: 600; background: #fbfdfe; box-sizing: border-box; font-family: 'Noto Serif JP', serif;
    }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--primary-color); background: #fff; }
    textarea { height: 100px; resize: none; }
    .date-time-row { display: flex; gap: 10px; }
    .date-time-row input[type="date"] { flex: 1.4; }
    .date-time-row input[type="time"] { flex: 1; }
    button { width: 100%; padding: 20px; background: var(--primary-color); color: #ffffff; border: none; font-size: 16px; font-weight: 900; cursor: pointer; letter-spacing: 2px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 94, 122, 0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #ffffff; padding: 45px 30px; max-width: 400px; width: 85%; text-align: center; border-top: 4px solid var(--primary-color); }
    .modal-button { display: block; background: var(--primary-color); color: #ffffff; text-decoration: none; padding: 18px; font-weight: 900; text-align: center; }
  </style>
</head>
<body>

<div class="header-container">
  <div class="header-title">Precious Invitation</div>
  <div class="header-subtitle">大分サロン 専用予約リクエストフォーム</div>
</div>

<div class="card">
  <div class="lead-text">
    【大分サロン：SPA Respiración】<br>
    特別ペア招待セッションのご希望日時を<br>
    第三希望までご選択くださいませ✨
  </div>

  <form id="resForm">
    <div class="form-group">
      <label>お名前（フルネーム）<span>*必須</span></label>
      <input type="text" id="resName" placeholder="お名前を入力してください" required>
    </div>

    <div class="form-group">
      <label>対象メニュー</label>
      <input type="text" id="resMenu" value="Precious Invitation 特別ペア招待セッション" readonly style="background:#f4f7f9; color:#777; cursor:not-allowed;">
    </div>

    <div class="form-group">
      <label>第一希望日時<span>*必須</span></label>
      <div class="date-time-row">
        <input type="date" id="date1" required>
        <input type="time" id="time1" required>
      </div>
    </div>

    <div class="form-group">
      <label>第二希望日時<span>*必須</span></label>
      <div class="date-time-row">
        <input type="date" id="date2" required>
        <input type="time" id="time2" required>
      </div>
    </div>

    <div class="form-group">
      <label>第三希望日時<span>*任意</span></label>
      <div class="date-time-row">
        <input type="date" id="date3">
        <input type="time" id="time3">
      </div>
    </div>

    <div class="form-group">
      <label>サロンへのメッセージ・ご要望<span>*任意</span></label>
      <textarea id="resMessage" placeholder="ペアで来られる方のお名前や、ご質問などがあればご記入ください。"></textarea>
    </div>

    <button type="submit">予約リクエストを送信する</button>
  </form>
</div>

<div id="beautyModal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <div style="font-size: 22px; color: var(--primary-color); margin-bottom: 20px; font-weight:900;">【テスト送信成功】</div>
    <div style="margin-bottom: 25px; font-size:14px; line-height:1.8; font-weight: 600; color:#555;">
      裏側でスプレッドシートへの記録が完了しました！<br>
      現在はテストモードのため、スタッフに通知はいきません。<br>
      シートに正しくデータが入っているかご確認ください。
    </div>
    <a id="lineLinkBtn" class="modal-button" href="https://www.google.com">テストを終了する（Googleへ）</a>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const lineUid = urlParams.get('uid') || 'TEST_USER_OITA';

  document.getElementById('resForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('resName').value;
    const menu = document.getElementById('resMenu').value;
    const area = "大分サロン（Respiración）";
    const dt1 = document.getElementById('date1').value + ' ' + document.getElementById('time1').value;
    const dt2 = document.getElementById('date2').value + ' ' + document.getElementById('time2').value;
    const d3 = document.getElementById('date3').value;
    const t3 = document.getElementById('time3').value;
    const dt3 = (d3 && t3) ? (d3 + ' ' + t3) : 'なし';
    const msg = document.getElementById('resMessage').value || '特になし';

    const formData = new URLSearchParams();
    formData.append('action', 'full_reservation_request');
    formData.append('uid', lineUid);
    formData.append('name', name);
    formData.append('area', area);
    formData.append('menu', menu);
    formData.append('dt1', dt1);
    formData.append('dt2', dt2);
    formData.append('dt3', dt3);
    formData.append('msg', msg);

    // 🌟 裏側でスプレッドシートへ送信
    fetch("https://script.google.com/macros/s/AKfycbwCFEoeGlvuEdH0Aj-qDly8FSRphx0sNHLMZmyYmJXs9hinQiqr4pBqmKw_s69VZNH30A/exec", {
      method: "POST",
      mode: "no-cors",
      body: formData
    }).then(() => {
      // 🌟 【本番切り替え用メモ】
      // テスト完了後は、下の href の中身を以下に書き換えるだけでスタッフLINEへジャンプします
      // "https://line.me/R/oaMessage/@gof2051l/?" + encodeURIComponent(`予約リクエストフォーム ｜ ${name}様\n\n【サロン】${area}\n【メニュー】${menu}\n【第一希望】${dt1}\n【第二希望】${dt2}\n【第三希望】${dt3}\n【メッセージ】${msg}`);
      document.getElementById('beautyModal').style.display = 'flex';
    });
  });
</script>
</body>
</html>
